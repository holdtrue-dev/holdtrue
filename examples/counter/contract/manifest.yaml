# holdtrue contract manifest. The human-reviewed source of truth.
version: 1
intent_id: INT-COUNTER-001
summary: "Counter(maximum) keeps a value in [0, maximum]; up/down are capped, reset goes to 0."
signature: "class Counter: up() -> None; down() -> None; reset() -> None; value() -> int"

# Which axes of intent were interrogated. Shown in the report so gaps stay visible.
interrogated_axes:
  - bounds (0 <= value <= maximum at all times)
  - up increments when not at max
  - down decrements when not at zero
  - up is a no-op at maximum
  - down is a no-op at zero
  - reset always returns to 0
  - model fidelity (value tracks a shadow counter)

# Stateful Hypothesis test: a sequence of operations, with invariants checked
# after every step.  This is the primary check for a stateful contract; a
# purely functional contract would use hypothesis_shown / hypothesis_heldout.
checks:
  stateful: "tests_shown/test_counter_stateful.py"
  hypothesis_shown: "tests_shown/test_counter_props.py"
  hypothesis_heldout: "tests_heldout/test_counter_heldout.py"
  mutation:
    threshold: 0.80

# Stateful contracts are runtime-enforced by the property test invariants;
# CrossHair cannot reason over class instances, so the verdict is capped at ENFORCED.
enforcement: runtime
acceptance:
  target_class: ENFORCED
