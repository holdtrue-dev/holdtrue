# holdtrue contract manifest. The human-reviewed source of truth.
version: 1
intent_id: INT-002
summary: "abs(x) returns x if x >= 0, else -x; result is never negative."
signature: "abs(x: int) -> int"
function: abs

# Which axes of intent were interrogated. Shown in the report so gaps stay visible.
interrogated_axes:
  - sign (result >= 0)
  - non-negative input (x >= 0 returns x)
  - negative input (x < 0 returns -x)
  - exact value (result == (x if x >= 0 else -x))
  - raises nothing

checks:
  # Spliced onto the implementer's function; CrossHair proves them over all ints.
  crosshair:
    decorators:
      - "@deal.ensure(lambda x, result: result >= 0)"
      - "@deal.ensure(lambda x, result: result == (x if x >= 0 else -x))"
      - "@deal.raises()"
    guarantee_if_exhausted: GUARANTEED

  hypothesis_shown: "tests_shown/test_abs.py"               # implementer may read
  hypothesis_heldout: "tests_heldout/test_abs_heldout.py"   # implementer never sees
  mutation:
    threshold: 0.85

# Each broken body must be rejected by the contract, or the intent is downgraded.
negative_probe:
  must_reject:
    - "return 0"
    - "return x"
    - "return -x"
    - "return x + 1"

acceptance:
  target_class: GUARANTEED
