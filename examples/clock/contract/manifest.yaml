# holdtrue contract manifest. The human-reviewed source of truth.
# A multi-function contract: several functions in one module, each proven on its own.
version: 1
intent_id: INT-008
summary: "wall-clock second maths on a 24h day: to-seconds, add (wrapping), is-am, minutes-between."

functions:
  - function: to_seconds
    signature: "to_seconds(h: int, m: int, s: int) -> int"
    summary: "seconds since midnight for a valid clock reading: h*3600 + m*60 + s."
    checks:
      crosshair:
        decorators:
          - "@deal.pre(lambda h, m, s: 0 <= h <= 23 and 0 <= m <= 59 and 0 <= s <= 59)"
          - "@deal.ensure(lambda h, m, s, result: result == h * 3600 + m * 60 + s)"
          - "@deal.raises()"
        guarantee_if_exhausted: GUARANTEED
    negative_probe:
      must_reject:
        - "return 0"
        - "return h + m + s"
        - "return h * 3600 + m + s"
        - "return h * 60 + m * 60 + s"

  - function: add_seconds
    signature: "add_seconds(sec: int, delta: int) -> int"
    summary: "a time of day plus a (possibly negative) delta, wrapped into 0..86399."
    checks:
      crosshair:
        decorators:
          - "@deal.pre(lambda sec, delta: 0 <= sec <= 86399 and -86400 <= delta <= 86400)"
          - "@deal.ensure(lambda sec, delta, result: result == (sec + delta) % 86400)"
          - "@deal.ensure(lambda sec, delta, result: 0 <= result <= 86399)"
          - "@deal.raises()"
        guarantee_if_exhausted: GUARANTEED
    negative_probe:
      must_reject:
        - "return sec"
        - "return sec + delta"
        - "return (sec + delta) % 3600"
        - "return delta % 86400"

  - function: is_am
    signature: "is_am(sec: int) -> bool"
    summary: "true when a time of day is before noon: sec < 43200."
    checks:
      crosshair:
        decorators:
          - "@deal.pre(lambda sec: 0 <= sec <= 86399)"
          - "@deal.ensure(lambda sec, result: result == (sec < 43200))"
          - "@deal.raises()"
        guarantee_if_exhausted: GUARANTEED
    negative_probe:
      must_reject:
        - "return True"
        - "return False"
        - "return sec <= 43200"
        - "return sec > 43200"

  - function: minutes_between
    signature: "minutes_between(a: int, b: int) -> int"
    summary: "whole minutes forward from a to b, wrapping past midnight: ((b - a) % 86400) // 60."
    checks:
      crosshair:
        decorators:
          - "@deal.pre(lambda a, b: 0 <= a <= 86399 and 0 <= b <= 86399)"
          - "@deal.ensure(lambda a, b, result: result == ((b - a) % 86400) // 60)"
          - "@deal.raises()"
        guarantee_if_exhausted: GUARANTEED
    negative_probe:
      must_reject:
        - "return 0"
        - "return (b - a) // 60"
        - "return ((b - a) % 86400) // 3600"
        - "return (b - a) % 86400"

interrogated_axes:
  - to_seconds is h*3600 + m*60 + s over a valid clock reading
  - add_seconds wraps into 0..86399 and equals (sec + delta) modulo a day
  - is_am is true exactly before noon (sec < 43200)
  - minutes_between counts whole minutes forward, wrapping past midnight
  - each function raises nothing on a valid input

checks:
  hypothesis_shown: "tests_shown/test_clock.py"
  hypothesis_heldout: "tests_heldout/test_clock_heldout.py"
  mutation:
    threshold: 0.85

acceptance:
  target_class: GUARANTEED
